<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jovi - Acesso Estudante</title>
    <!-- CSS EXTERNO -->
    <link rel="stylesheet" href="/scr/css/style.css">
</head>
<body>

    <main id="app-container">
        <section id="login-section">
            <div class="logo">
                <img src="scr/assents/jovi.png" alt="jovi">
                <p>Smartphones para estudantes</p>
            </div>
            
            <form id="loginForm">
                <h2>Acesse seu Perfil</h2>
                <div class="input-group">
                    <label for="username">Nome Completo:</label>
                    <input type="text" id="username" placeholder="Digite seu nome" required>
                </div>
                <div class="input-group">
                    <label for="rm">RM do Aluno ou Professor:</label>
                    <input type="number" id="rm" placeholder="Ex: 55432" required>
                </div>
                <button type="submit" id="btn-entrar">Iniciar Configuração</button>
            </form>
        </section>

        
        <section id="onboarding-section" class="hidden">
            <h2>Personalize sua Experiência</h2>
            <p>Responda rápido para fins de pesquisa, responda a pergunta da melhor forma:</p>
            
            <div id="questionario">
                <p id="pergunta-atual">Como você mais utiliza a câmera?</p>
                <div class="options">
                    <button class="opt-btn" data-value="doc">Digitalizar Documentos</button>
                    <button class="opt-btn" data-value="social">Redes Sociais</button>
                    <button class="opt-btn" data-value="aula">Fotos de Lousa/Slides</button>
                </div>
            </div>
        </section>

        
        <section id="camera-section" class="hidden">
            <header>
                <span id="modo-atual">Modo: Padrão</span>
            </header>

            <div class="viewport">
                
                <img src="scr/assents/estudos.jpg" id="camera-preview" alt="Preview da Câmera">
                
                
                <div id="feedback-balao" class="hidden">
                    <p id="feedback-texto"></p>
                </div>
            </div>

            <div class="camera-controls">
                <button id="btn-comparar">Clique Aqui para ver com o recurso!</button>
                <div class="shutter-row">
                    <button id="btn-shutter"></button>
                </div>
                
            </div>
        </section>


        
        <section id="interativo-section" class="hidden">
            <div class="feedback-container">
                <h2>Avalie sua Experiência Jovi</h2>
                <div id="quiz-container">
                    
                </div>
                <div id="resultado-feedback" class="hidden">
                    <h3>Obrigado pelo seu tempo!</h3>
                    <p id="msg-final"></p>
                    <button onclick="location.reload()">Finalizar e Sair</button>
                </div>
            </div>
        </section>


    </main>

    <!-- JS EXTERNO -->
    <script src="scr/js/script.js"></script>
</body>
</html>
