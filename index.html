<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jovi - Acesso Estudante</title>
    <link rel="stylesheet" href="/scr/css/style.css">
</head>
<body>
    <main id="app-container">
        <section id="login-section">
            <div class="logo">
                <img src="scr/assents/jovi.png" alt="jovi">
                <p>Smartphones para estudantes</p>
            </div>
            
            <form id="loginForm">
                <h2>Acesse seu Perfil</h2>
                <div class="input-group">
                    <label for="username">Nome Completo:</label>
                    <input type="text" id="username" placeholder="Digite seu nome" required>
                </div>
                <div class="input-group">
                    <label for="rm">RM do Aluno ou Professor:</label>
                    <input type="number" id="rm" placeholder="Ex: 55432" required>
                </div>
                <button type="submit" id="btn-entrar">Iniciar Configuração</button>
            </form>
        </section>
    </main>
    <script src="scr/js/script.js"></script>
</body>
</html>
